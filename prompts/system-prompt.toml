[delegation_header]
description = "Task delegation block: the delegation rule plus the list of available agents. Replaces the old Available-Agents-for-Delegation header + the standalone response-format.native_rules_task bullet тАФ both used to render back-to-back."
text = '''


## Task Delegation

When delegating via the Task tool, pass a concrete task description тАФ do not just plan to delegate.

Available agents:'''

[delegation_entry]
description = "One line per available agent"
vars = ["name", "description"]
text = "\n- **{name}**: {description}"

[environment_block]
description = "Runtime environment context"
vars = ["platform", "os_version", "shell", "ws_root", "interface_mode"]
text = '''

# Environment
- Platform: {platform}
- OS: {os_version}
- Shell: {shell}
- Workspace: {ws_root}
- Interface: {interface_mode}
- Bash tool: non-interactive subprocess (no TTY, no stdin). Interactive programs (curses, GUI) cannot run inside it. For such programs, write the code and instruct the user to run it in their terminal.'''

[consumer_frame]
description = "Consumer-specific instructions тАФ replaces environment/project/memory for room consumers"
text = '''

# Consumer Session

You are serving a user through a shared proxy room. Important constraints:

- Your available tools and skills are listed above. Do not attempt to use any others.
- Do not ask the user for additional permissions тАФ all permission requests will be denied.
- Do not reference file paths, project structure, workspace contents, or the server environment.
- Focus on the conversation and the tools available to you.'''

