# Static system prompt sections assembled into the system prompt.
# Category: system-prompt-* (per Claude Code conventions)

[fallback_identity]
description = "Default system prompt when no agent spec is configured"
text = "You are a helpful AI assistant."

[skills_header]
description = "Section header listing available skills for the Skill tool"
text = "\n\n## Available Skills\n\nUse the `Skill` tool to invoke a skill by name. Available skills:"

[skill_entry]
description = "One line per available skill"
vars = ["name", "description"]
text = "\n- **{name}**: {description}"

[active_skill_frame]
description = "Wraps the active skill content injected into the system prompt"
vars = ["name", "description", "content"]
text = '''

--- ACTIVE SKILL ---
Skill: {name}
Description: {description}

{content}
-------------------'''

[active_mission_frame]
description = "Wraps the active mission content injected into the system prompt. Mirrors active_skill_frame — the mission body is step-by-step instructions the agent executes autonomously."
vars = ["name", "description", "content"]
text = '''

--- ACTIVE MISSION ---
Mission: {name}
Description: {description}

{content}
----------------------'''

[app_skill_dashboard_hint]
description = "Generic PageUpdate reminder appended after an app-skill body. Only used when the skill body itself does not already document PageUpdate."
text = '''


## Dashboard updates

This skill has a dashboard UI. Call `PageUpdate` whenever state the user should see has changed — task complete, new results, progress changed.

Pass `top_bar`, `body`, and/or `footer` as flat top-level arguments — there is NO `page` wrapper. Omit any section you don't want to change (previous values persist). At least one section must be provided and non-empty; an empty call is an error and will be rejected.

Example shape (fill in per your skill's schema):
```
PageUpdate({ "top_bar": [...], "body": [...], "footer": {"text": "..."} })
```

Do not emit page JSON as text — always use the tool.
'''

[project_instructions_header]
description = "Opening delimiter for project context files"
text = "\n\n--- PROJECT INSTRUCTIONS ---"

[project_instructions_entry]
description = "One project context file"
vars = ["label", "content"]
text = "\n\n# {label}\n\n{content}"

[project_instructions_footer]
description = "Closing delimiter for project context files"
text = "\n\n--- END PROJECT INSTRUCTIONS ---"

[core_memory_block]
description = "Built-in core memory — identity + working style, always inlined."
vars = ["core_dir", "identity", "style"]
text = '''

# Core memory

Universal facts about the user and how they want to work, inlined from
`{core_dir}`. Trust these as current truth without re-reading the files.

## Identity (from identity.md)

{identity}

## Working style (from style.md)

{style}

## Usage rules

- Apply these without re-reading the files.
- If the user expresses a durable identity fact or cross-project preference,
  or contradicts something above, Edit the matching file immediately.
- Keep core tiny. Project-specific rules belong in that project's CLAUDE.md
  or AGENTS.md — not here. Scoped facts, activity logs, and semantic
  retrieval belong in the memory skill (`Memory_*` tools) — not here.
--- END CORE MEMORY ---'''

[core_memory_block_empty]
description = "Bootstrap hint when core memory files exist but are still unedited scaffolding."
vars = ["core_dir"]
text = '''

# Core memory

Core memory at `{core_dir}` has not been populated yet.

- `identity.md` — who the user is (name, role, timezone, languages, core
  preferences). Keep entries universal: true across every project.
- `style.md` — how the user wants the agent to work (tone, format, pacing,
  universal do/don't).

If the user expresses a durable identity fact or cross-project preference,
or explicitly asks you to remember something universal, Edit the matching
file immediately (one short bullet). Project-specific rules go in that
project's CLAUDE.md or AGENTS.md; scoped facts and activity go through
`Memory_*` tools when a memory skill is installed.
--- END CORE MEMORY ---'''

[delegation_header]
description = "Section header listing available agents for Task delegation"
text = "\n\n## Available Agents for Delegation\n\nYou can delegate tasks to the following agents using the Task tool:"

[delegation_entry]
description = "One line per available agent"
vars = ["name", "description"]
text = "\n- **{name}**: {description}"

[environment_block]
description = "Runtime environment context"
vars = ["platform", "os_version", "shell", "ws_root", "interface_mode"]
text = '''

# Environment
- Platform: {platform}
- OS: {os_version}
- Shell: {shell}
- Workspace: {ws_root}
- Interface: {interface_mode}
- Bash tool: non-interactive subprocess (no TTY, no stdin). Interactive programs (curses, GUI) cannot run inside it. For such programs, write the code and instruct the user to run it in their terminal.'''

[consumer_frame]
description = "Consumer-specific instructions — replaces environment/project/memory for room consumers"
text = '''

# Consumer Session

You are serving a user through a shared proxy room. Important constraints:

- Your available tools and skills are listed above. Do not attempt to use any others.
- Do not ask the user for additional permissions — all permission requests will be denied.
- Do not reference file paths, project structure, workspace contents, or the server environment.
- Focus on the conversation and the tools available to you.'''

